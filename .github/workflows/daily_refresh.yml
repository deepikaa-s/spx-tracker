name: Daily SPX Refresh

on:
  schedule:
    - cron: '30 21 * * 1-5'   # 21:30 UTC, Mon–Fri (90 min after NYSE close)
  workflow_dispatch:            # allow manual trigger from GitHub Actions UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch market data
        run: python agent/run_daily.py

      - name: Build static site
        run: python agent/build_static.py

      - name: Commit and push docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "chore: refresh SPX data $(date -u +%Y-%m-%d)"
          git push
